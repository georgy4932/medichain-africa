<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orela — Medicine Availability Network</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#04080f;--teal:#19c2b5;--teal-dim:rgba(25,194,181,0.08);
      --border:#0d1f33;--text-1:#e8f4ff;--text-2:#4a7090;--text-3:#1e3a52;
      --sans:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
      --nav-h:54px;
    }
    html,body{width:100%;height:100%;font-family:var(--sans);background:var(--bg);color:var(--text-1);overflow:hidden}

    /* Starfield */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1px 1px at 72% 8%,rgba(255,255,255,.3) 0%,transparent 100%),
        radial-gradient(1px 1px at 45% 75%,rgba(255,255,255,.25) 0%,transparent 100%),
        radial-gradient(1px 1px at 88% 45%,rgba(255,255,255,.35) 0%,transparent 100%),
        radial-gradient(1px 1px at 30% 55%,rgba(255,255,255,.2) 0%,transparent 100%),
        radial-gradient(1px 1px at 60% 30%,rgba(255,255,255,.3) 0%,transparent 100%),
        radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.2) 0%,transparent 100%),
        radial-gradient(1px 1px at 95% 70%,rgba(255,255,255,.25) 0%,transparent 100%),
        radial-gradient(1px 1px at 50% 5%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,.15) 0%,transparent 100%),
        radial-gradient(600px 600px at 20% 80%,rgba(25,194,181,.04) 0%,transparent 70%),
        radial-gradient(800px 800px at 80% 20%,rgba(25,100,180,.03) 0%,transparent 70%);
    }
    /* Grid */
    body::after{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(rgba(25,194,181,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(25,194,181,.018) 1px,transparent 1px);
      background-size:56px 56px;
    }

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:var(--nav-h);background:rgba(4,8,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo{width:28px;height:28px;background:var(--teal);border-radius:6px;display:flex;align-items:center;justify-content:center}
    .nav-logo svg{width:13px;height:13px;color:#04080f}
    .nav-name{font-size:17px;font-weight:700;color:var(--text-1);letter-spacing:-.03em}
    .nav-tag{font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--teal);background:var(--teal-dim);border:1px solid rgba(25,194,181,.2);padding:3px 8px;border-radius:3px}

    /* MAIN */
    main{
      position:fixed;
      top:var(--nav-h);
      left:0;right:0;
      bottom:40px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:16px 20px 8px;
      z-index:1;
      overflow-y:auto;
    }

    /* HEADLINE */
    .headline{text-align:center;margin-bottom:20px;animation:fadeUp .8s ease both;flex-shrink:0}
    .eyebrow{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--teal);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
    .pulse{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    h1{font-size:clamp(20px,3vw,40px);font-weight:700;letter-spacing:-.04em;line-height:1.1;color:var(--text-1)}
    h1 em{font-style:normal;color:var(--teal)}
    .sub{margin-top:9px;font-size:12.5px;color:var(--text-2);font-weight:300;letter-spacing:.01em}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* MAP */
    .map-wrap{position:relative;width:min(400px,85vw);flex-shrink:0;animation:fadeUp .9s ease .15s both}
    #msv{display:block;filter:drop-shadow(0 0 48px rgba(25,194,181,.06))}
    .c{fill:#0a1828;stroke:#0f2a40;stroke-width:.6;transition:fill .15s}
    .cn{fill:rgba(25,194,181,.18)!important;stroke:#19c2b5!important;stroke-width:1.2!important;cursor:pointer;animation:nglow 3s ease-in-out infinite}
    @keyframes nglow{0%,100%{fill:rgba(25,194,181,.16);filter:drop-shadow(0 0 6px rgba(25,194,181,.4))}50%{fill:rgba(25,194,181,.30);filter:drop-shadow(0 0 16px rgba(25,194,181,.65))}}
    .cn:hover{fill:rgba(25,194,181,.40)!important}

    /* LEGEND */
    .legend{display:flex;align-items:center;gap:20px;margin-top:16px;justify-content:center;flex-shrink:0;animation:fadeUp 1s ease .3s both}
    .legend-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-2)}
    .ld{width:7px;height:7px;border-radius:50%}
    .ld-on{background:var(--teal);animation:blink 2s infinite}
    .ld-off{background:#0f2a40;border:1px solid #1a3a55}

    /* STATUS BAR */
    .status-bar{position:fixed;bottom:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:center;gap:32px;background:rgba(4,8,15,.9);border-top:1px solid var(--border);backdrop-filter:blur(20px);z-index:100}
    .si{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-2)}

    @media(max-width:600px){
      nav{padding:0 20px}
      .status-bar{gap:16px}
      h1{font-size:clamp(18px,5vw,28px)}
      .headline{margin-bottom:14px}
      .legend{margin-top:12px}
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <div class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg></div>
    <span class="nav-name">Orela</span>
  </a>
  <span class="nav-tag">Beta · Africa</span>
</nav>

<main>
  <div class="headline">
    <div class="eyebrow">Medicine Availability Network</div>
    <h1><em>Africa</em></h1>
    <div class="sub">Select your country to access the network</div>
  </div>

  <div class="map-wrap" id="mw">
    <svg id="msv"></svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="ld ld-on"></div>Active — Nigeria</div>
    <div class="legend-item"><div class="ld ld-off"></div>Coming soon</div>
  </div>
</main>

<div class="status-bar">
  <div class="si"><div class="pulse"></div><span style="color:#19c2b5">1 region active</span></div>
  <div class="si">Network · Beta</div>
  <div class="si">orela.africa</div>
</div>

<script>
const AFRICA_ISO=new Set(["DZA","AGO","BEN","BWA","BFA","BDI","CMR","CPV","CAF","TCD","COM","COD","COG","CIV","DJI","EGY","GNQ","ERI","SWZ","ETH","GAB","GMB","GHA","GIN","GNB","KEN","LSO","LBR","LBY","MDG","MWI","MLI","MRT","MUS","MAR","MOZ","NAM","NER","NGA","RWA","STP","SEN","SLE","SOM","ZAF","SSD","SDN","TZA","TGO","TUN","UGA","ZMB","ZWE","ESH"]);

async function build(){
  const wrap=document.getElementById('mw');
  const W=wrap.clientWidth||400;
  const availH=window.innerHeight-54-40;
  const H=Math.min(W*1.28, availH*0.72);
  const svg=d3.select('#msv').attr('width',W).attr('height',H).attr('viewBox',`0 0 ${W} ${H}`);

  const SOURCES=[
    'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson',
  ];

  let geojson=null;
  for(const url of SOURCES){
    try{
      const r=await fetch(url);if(!r.ok)continue;
      const world=await r.json();
      geojson={type:'FeatureCollection',features:world.features.filter(f=>AFRICA_ISO.has(f.properties.ISO_A3||f.properties.iso_a3||f.properties.ADM0_A3||''))};
      if(geojson.features.length>10)break;
    }catch(e){continue}
  }

  if(!geojson||geojson.features.length===0){
    buildStaticMap(svg,W,H);
    return;
  }

  const proj=d3.geoMercator().fitExtent([[4,4],[W-4,H-4]],geojson);
  const pg=d3.geoPath().projection(proj);

  svg.selectAll('path')
    .data(geojson.features).enter().append('path')
    .attr('class',d=>(d.properties.ISO_A3||d.properties.iso_a3||d.properties.ADM0_A3||'')==='NGA'?'c cn':'c')
    .attr('d',pg)
    .on('click',(e,d)=>{if((d.properties.ISO_A3||d.properties.iso_a3||d.properties.ADM0_A3||'')==='NGA')window.location.href='/ng'});

  const ngf=geojson.features.find(f=>(f.properties.ISO_A3||f.properties.iso_a3||f.properties.ADM0_A3||'')==='NGA');
  if(ngf){
    const[cx,cy]=pg.centroid(ngf);
    addPulseRing(svg,cx,cy);
  }
}

function buildStaticMap(svg,W,H){
  const sx=W/400, sy=H/500;
  const paths=[
    "M143,22 L196,18 L214,28 L220,55 L210,72 L185,78 L155,70 L135,55 L130,38 Z",
    "M115,55 L135,55 L155,70 L152,108 L130,118 L108,105 L100,78 Z",
    "M80,72 L115,55 L108,105 L130,118 L125,155 L95,168 L68,152 L62,118 L65,88 Z",
    "M135,55 L210,72 L245,68 L255,100 L250,140 L210,155 L175,148 L155,130 L152,108 L155,70 Z",
    "M210,72 L245,68 L258,82 L250,105 L235,112 L215,100 L210,85 Z",
    "M245,68 L310,62 L330,75 L328,115 L310,130 L280,135 L255,125 L250,105 L258,82 Z",
    "M310,62 L375,58 L388,72 L382,110 L355,125 L330,120 L328,115 L310,130 L305,95 Z",
    "M95,168 L125,155 L155,148 L175,148 L178,178 L168,205 L138,218 L108,215 L88,200 L82,182 Z",
    "M175,148 L210,155 L250,140 L260,155 L268,185 L250,205 L225,215 L195,215 L168,205 L178,178 Z",
    "M62,168 L82,158 L95,168 L88,195 L72,202 L55,192 L52,175 Z",
    "M52,192 L72,202 L82,195 L88,215 L78,232 L58,238 L42,225 L40,208 Z",
    "M58,238 L78,232 L92,242 L98,262 L82,275 L60,268 L48,252 Z",
    "M88,215 L108,215 L130,218 L145,232 L148,255 L128,268 L102,265 L92,248 L78,232 Z",
    "M108,190 L138,190 L155,195 L162,212 L148,225 L130,225 L108,215 Z",
    "M130,225 L148,225 L162,230 L168,255 L155,272 L135,275 L118,262 L115,242 Z",
    "M162,225 L172,228 L178,248 L172,268 L158,268 L155,248 L162,230 Z",
    "M172,228 L188,225 L198,238 L195,262 L178,268 L172,248 Z",
    "M260,155 L300,138 L330,145 L340,175 L332,208 L308,222 L282,228 L258,215 L250,205 L268,185 Z",
    "M300,138 L328,115 L358,128 L378,148 L380,188 L365,215 L340,225 L332,208 L330,145 Z",
    "M358,128 L388,118 L402,138 L392,158 L372,155 L365,140 Z",
    "M258,212 L282,225 L298,242 L295,268 L275,278 L258,272 L250,262 L252,238 L268,228 Z",
    "M282,225 L310,222 L340,228 L345,258 L325,272 L298,272 L282,258 L282,238 Z",
    "M340,225 L365,215 L385,228 L388,255 L368,272 L345,268 L338,248 Z",
    "M365,215 L400,205 L422,215 L428,245 L408,268 L380,272 L362,258 L360,238 Z",
    "M400,205 L430,195 L452,218 L455,255 L438,282 L415,285 L408,265 L422,245 Z",
    "M345,268 L368,272 L372,292 L352,302 L332,295 L328,278 Z",
    "M345,295 L362,292 L368,308 L352,315 L338,308 Z",
    "M368,272 L388,258 L415,268 L420,298 L405,318 L382,322 L362,308 L362,292 Z",
    "M255,278 L278,278 L295,292 L292,318 L268,325 L248,315 L242,295 Z",
    "M278,278 L300,272 L328,278 L338,308 L335,345 L312,358 L285,355 L262,338 L248,315 L268,325 L272,298 L295,292 Z",
    "M362,308 L405,318 L412,345 L395,368 L368,375 L342,368 L335,345 L338,315 L352,315 Z",
    "M242,318 L268,325 L272,355 L268,388 L245,405 L218,405 L202,388 L198,362 L212,340 Z",
    "M272,355 L312,358 L338,355 L348,382 L330,405 L298,412 L272,405 L262,385 Z",
    "M345,358 L365,355 L375,378 L368,402 L348,405 L342,382 Z",
    "M368,375 L398,368 L415,388 L412,428 L395,452 L372,458 L355,435 L348,405 L368,402 L375,378 Z",
    "M298,412 L330,408 L348,405 L355,435 L335,448 L308,445 L292,428 Z",
    "M248,408 L292,408 L308,445 L292,462 L258,465 L238,448 L238,428 Z",
    "M198,368 L238,362 L245,405 L238,448 L215,458 L192,445 L182,415 L185,388 Z",
    "M182,415 L218,408 L245,408 L258,465 L292,468 L308,488 L288,512 L255,522 L218,515 L188,498 L172,472 L168,445 Z",
    "M255,488 L272,482 L282,495 L268,508 L252,502 Z",
    "M360,318 L375,315 L385,338 L388,372 L375,398 L358,398 L348,375 L350,345 Z",
  ];

  const g=svg.append('g').attr('transform',`scale(${sx},${sy})`);
  paths.forEach(d=>g.append('path').attr('class','c').attr('d',d));

  const ngPath="M188,222 L225,212 L258,212 L270,228 L272,258 L258,278 L235,285 L210,282 L192,268 L185,248 L188,235 Z";
  g.append('path').attr('class','c cn').attr('d',ngPath).on('click',()=>window.location.href='/ng');

  const cx=229*sx, cy=248*sy;
  addPulseRing(svg,cx,cy);
}

function addPulseRing(svg,cx,cy){
  const g=svg.append('g').style('pointer-events','none');
  g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',4).attr('fill','#19c2b5').attr('opacity',.95);
  function ring(){
    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',5)
      .attr('fill','none').attr('stroke','#19c2b5').attr('stroke-width',1.2).attr('opacity',.8)
      .transition().duration(2400).ease(d3.easeLinear).attr('r',30).attr('opacity',0)
      .remove().on('end',ring);
  }
  ring();
}

build();
window.addEventListener('resize',()=>{d3.select('#msv').selectAll('*').remove();build()});
</script>
</body>
</html>
